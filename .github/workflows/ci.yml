name: Task Manager CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build-backend:
    name: Build Spring Boot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Maven
        run: |
          cd task-manager-backend/task-manager-backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests

  test-backend:
    name: Test Spring Boot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run tests
        run: |
          cd task-manager-backend/task-manager-backend
          chmod +x mvnw
          ./mvnw test
        continue-on-error: true

  build-frontend:
    name: Build Angular
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install and build
        run: |
          cd task-manager-frontend
          npm install
          npm run build -- --configuration production

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v3
      - name: Build backend image
        run: docker build -t task-manager-backend ./task-manager-backend/task-manager-backend
      - name: Build frontend image
        run: docker build -t task-manager-frontend ./task-manager-frontend
      - name: Show images
        run: docker images
